# ===================================
# Kas Kita Backend - Application Config
# ===================================

server.port=${PORT:8080}
spring.application.name=kas-kita-backend

# Logging
logging.level.com.kaskita=DEBUG
logging.level.org.springframework.security=INFO

# Telegram Bot Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=kasing_bot

# CORS & Custom Properties
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}

# Forward Headers Strategy for Render SSL Proxy
server.forward-headers-strategy=FRAMEWORK

# Spring Profiles
spring.profiles.active=local
